<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produktliste</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="product-list-page">
      <h1 class="product-list-title">Produktliste</h1>

      <section class="product-grid" aria-label="Produkter">
        <a class="product-card" href="product.html">
          <img src="https://kea-alt-del.dk/t7/images/webp/640/1532.webp" alt="Produkt 1" />
          <div class="product-card-content">
            <h2>Active Tee</h2>
            <p class="brand">Brand: Northwind</p>
            <p class="price">Pris: 299 kr.</p>
          </div>
        </a>

        <a class="product-card is-offer" href="product.html">
          <span class="badge badge-offer">Tilbud</span>
          <img src="https://kea-alt-del.dk/t7/images/webp/640/1525.webp" alt="Produkt 2" />
          <div class="product-card-content">
            <h2>Urban Jacket</h2>
            <p class="brand">Brand: Peakline</p>
            <p class="price">Pris: 599 kr.</p>
          </div>
        </a>

        <a class="product-card is-soldout" href="product.html">
          <span class="badge badge-soldout">Udsolgt</span>
          <img src="https://kea-alt-del.dk/t7/images/webp/640/1164.webp" alt="Produkt 3" />
          <div class="product-card-content">
            <h2>Run Shorts</h2>
            <p class="brand">Brand: Flystep</p>
            <p class="price">Pris: 249 kr.</p>
          </div>
        </a>

        <a class="product-card is-offer is-soldout" href="product.html">
          <span class="badge badge-offer">Tilbud</span>
          <span class="badge badge-soldout second">Udsolgt</span>
          <img src="https://kea-alt-del.dk/t7/images/webp/640/1165.webp" alt="Produkt 4" />
          <div class="product-card-content">
            <h2>Trail Shoes</h2>
            <p class="brand">Brand: Alpine</p>
            <p class="price">Pris: 799 kr.</p>
          </div>
        </a>
      </section>
    </main>
  </body>
</html>
